<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards – Signos em IHC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    color: #fff;
  }
  h1 { font-size: 22px; margin-bottom: 4px; color: #e0e0ff; letter-spacing: 1px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  .progress { font-size: 13px; color: #aaa; margin-bottom: 16px; }
  .card-area { width: 100%; max-width: 620px; perspective: 1200px; margin-bottom: 24px; }
  .card {
    width: 100%; min-height: 230px; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; width: 100%; min-height: 230px;
    border-radius: 16px; backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 30px 28px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .card-front { background: linear-gradient(135deg, #16213e, #0f3460); border: 1px solid #334; }
  .card-back { background: linear-gradient(135deg, #0f3460, #533483); border: 1px solid #557; transform: rotateY(180deg); }
  .tag { font-size: 10px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #aab; margin-bottom: 14px; }
  .card-front .question { font-size: 17px; font-weight: 600; color: #dde; line-height: 1.5; }
  .card-back .answer { font-size: 14px; color: #eef; line-height: 1.8; }
  .card-back .answer strong { color: #c9b8ff; }
  .hint { font-size: 11px; color: #556; margin-top: 16px; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
  button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  button:active { transform: scale(0.97); }
  #btn-prev { background: #223; color: #aab; border: 1px solid #445; }
  #btn-prev:hover { background: #334; }
  #btn-flip { background: #533483; color: #fff; }
  #btn-flip:hover { background: #6a42a8; }
  #btn-next { background: #0f3460; color: #dde; border: 1px solid #336; }
  #btn-next:hover { background: #1a4a80; }
  #btn-shuffle { background: #1a1a2e; color: #778; border: 1px solid #334; font-size: 12px; padding: 8px 16px; }
  #btn-shuffle:hover { background: #223; }
  .bar-wrap { width: 100%; max-width: 620px; background: #223; border-radius: 99px; height: 6px; margin-bottom: 8px; }
  .bar-fill { height: 6px; border-radius: 99px; background: linear-gradient(90deg, #533483, #0f3460); transition: width 0.4s; }
  .cat-wrap { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 620px; margin-bottom: 20px; }
  .cat-btn { font-size: 11px; padding: 5px 12px; border-radius: 99px; border: 1px solid #445; background: #1a1a2e; color: #aab; cursor: pointer; transition: background 0.2s; }
  .cat-btn.active { background: #533483; color: #fff; border-color: #533483; }
  .cat-btn:hover { background: #334; }
  .total-info { font-size: 11px; color: #556; margin-bottom: 10px; }
</style>
</head>
<body>

<h1>Flashcards — Signos em IHC</h1>
<p class="subtitle">Clique no card para revelar a resposta</p>

<div class="cat-wrap" id="cats"></div>
<div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
<div class="progress" id="progress"></div>

<div class="card-area">
  <div class="card" id="card" onclick="flipCard()">
    <div class="card-front">
      <div class="tag" id="tag"></div>
      <div class="question" id="question"></div>
      <div class="hint">toque para ver a resposta</div>
    </div>
    <div class="card-back">
      <div class="tag">Resposta</div>
      <div class="answer" id="answer"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button id="btn-prev" onclick="navigate(-1)">← Anterior</button>
  <button id="btn-flip" onclick="flipCard()">Virar</button>
  <button id="btn-next" onclick="navigate(1)">Próximo →</button>
</div>
<button id="btn-shuffle" onclick="shuffle()">🔀 Embaralhar</button>

<script>
const ALL_CARDS = [
  // ── CONCEITO GERAL ──
  {
    cat: "Conceito Geral",
    q: "O que são signos no Design Centrado na Comunicação?",
    a: "Signos são os <strong>elementos de informação</strong> usados nas falas do usuário, do sistema ou de interlocutores externos durante a interação. Toda fala faz uso de signos."
  },
  {
    cat: "Conceito Geral",
    q: "Qual a relação entre conversa, diálogo, fala e signo?",
    a: "Uma <strong>conversa</strong> tem um tópico geral → desdobra-se em <strong>diálogos</strong> (subtópicos) → compostos por <strong>falas</strong> do usuário e do preposto → cada fala usa <strong>signos</strong>."
  },
  {
    cat: "Conceito Geral",
    q: "O que é o Esquema Conceitual de Signos?",
    a: "É um artefato de design que <strong>define e organiza os conceitos</strong> do sistema, em especial os que emergem na interface. Inclui informações envolvidas em cada fala que afete a interação usuário-sistema."
  },
  {
    cat: "Conceito Geral",
    q: "Como o Esquema Conceitual de Signos evolui ao longo do design?",
    a: "Primeiro define-se o <strong>conteúdo</strong> dos signos. À medida que o design avança, define-se também a <strong>expressão</strong> dos signos — como se manifestam na interface e como o usuário 'fala sobre' eles."
  },
  {
    cat: "Conceito Geral",
    q: "Como os signos aparecem no MoLIC (2ª etapa)?",
    a: "Na 2ª etapa do MoLIC, os designers detalham os <strong>diálogos, as falas e os signos de cada cena</strong>. Os diálogos são enunciados como <em>verbo + objeto</em>, onde o objeto costuma ser um signo-entidade ou signo-atributo."
  },

  // ── TIPOS DE SIGNOS ──
  {
    cat: "Tipos de Signos",
    q: "O que é um Signo-entidade? Como é indicado?",
    a: "Signo relacionado a um <strong>conceito ou entidade</strong> do domínio ou do sistema. Indicado por <strong>letra inicial Maiúscula</strong>. Ex.: <em>Atendimento</em>, <em>Monitor</em>, <em>Estudante</em>."
  },
  {
    cat: "Tipos de Signos",
    q: "O que é um Signo-atributo? Como é indicado?",
    a: "Corresponde a uma <strong>característica de um signo-entidade</strong>. Indicado por <strong>letra inicial minúscula</strong>. Ex.: <em>data</em>, <em>assunto da dúvida</em>, <em>status</em>."
  },
  {
    cat: "Tipos de Signos",
    q: "O que é um signo identificador e como é representado?",
    a: "É o atributo que <strong>identifica univocamente uma entidade</strong> (não apenas a caracteriza). Representado pelo símbolo <strong>(+)</strong> na tabela de signos."
  },
  {
    cat: "Tipos de Signos",
    q: "Qual a diferença de notação entre signo-entidade e signo-atributo?",
    a: "<strong>Signo-entidade</strong> → inicial <strong>Maiúscula</strong> (ex.: <em>Horário</em>)<br><strong>Signo-atributo</strong> → inicial <strong>minúscula</strong> (ex.: <em>hora de início</em>)"
  },

  // ── ORIGEM DOS SIGNOS ──
  {
    cat: "Origem dos Signos",
    q: "O que são Signos de Domínio?",
    a: "Signos <strong>encontrados no mundo do usuário</strong>, independentemente do sistema. Existem antes e fora do sistema.<br>Ex.: nome do estudante, endereço de uma pessoa."
  },
  {
    cat: "Origem dos Signos",
    q: "O que são Signos Transformados?",
    a: "Originados no domínio, mas que <strong>sofrem transformação ao entrar no sistema</strong> — por analogia ou metáfora.<br>Ex.: pasta de arquivos digitais (adaptação da pasta física)."
  },
  {
    cat: "Origem dos Signos",
    q: "O que são Signos de Aplicação?",
    a: "Signos que <strong>só fazem sentido dentro do sistema</strong>, sem significado prévio para o usuário.<br>Ex.: porcentagem de download de um arquivo."
  },
  {
    cat: "Origem dos Signos",
    q: "O que são Signos Convencionais?",
    a: "São signos transformados ou de aplicação que <strong>já foram estabelecidos como convenções culturais</strong>.<br>Ex.: ícone de lixeira para deletar, X para fechar janela."
  },

  // ── EXPRESSÃO DOS SIGNOS (PARTE II) ──
  {
    cat: "Expressão dos Signos",
    q: "O que define a expressão de um signo?",
    a: "A expressão define <strong>qual elemento de interface (widget)</strong> será utilizado para apresentar ou permitir a manipulação do conteúdo do signo pelo usuário."
  },
  {
    cat: "Expressão dos Signos",
    q: "Quando o emissor é o preposto (d:), qual tipo de widget é usado?",
    a: "Quando o emissor é o preposto do designer (d:), o signo é apresentado ao usuário por elementos de <strong>saída de dados (output)</strong> — ex.: texto exibido, rótulo, lista."
  },
  {
    cat: "Expressão dos Signos",
    q: "Quando ambos usuário e preposto falam sobre o signo (u+d:), qual tipo de widget é usado?",
    a: "Quando emissor = u+d, as expressões são elementos de <strong>entrada de dados (input)</strong> — ex.: campo de texto, seletor de data, dropdown."
  },
  {
    cat: "Expressão dos Signos",
    q: "Um signo pode ter mais de uma expressão?",
    a: "Sim! Cada signo pode apresentar <strong>expressão diferente conforme o interlocutor e o contexto</strong>.<br>Ex.: 'data de entrega' pode aparecer como texto dd/mm/aaaa em uma cena e como calendário em outra."
  },
  {
    cat: "Expressão dos Signos",
    q: "Quando são definidas as expressões dos signos no processo de design?",
    a: "As expressões são definidas <strong>em paralelo à elaboração da interface</strong>, na fase mais avançada do design, concluindo assim o Esquema Conceitual de Signos."
  },

  // ── RESTRIÇÕES E RUPTURAS ──
  {
    cat: "Restrições e Rupturas",
    q: "O que são restrições sobre o conteúdo de um signo?",
    a: "São <strong>regras sobre os valores válidos</strong> que um signo-atributo pode assumir. Ex.: 'data' deve estar no formato dd/mm/aaaa; 'status' só pode ser 'Concluído' ou 'Ausência'."
  },
  {
    cat: "Restrições e Rupturas",
    q: "O que é Prevenção Passiva (PP) em relação a signos?",
    a: "O preposto tenta <strong>evitar rupturas fornecendo explicações</strong> sobre a interface.<br>Ex.: mostrar '(dd/mm/aaaa)' ao lado de campo de data; indicar campos obrigatórios com asterisco (*)."
  },
  {
    cat: "Restrições e Rupturas",
    q: "O que é Prevenção Ativa (PA)?",
    a: "O preposto <strong>impede que o usuário emita falas inválidas</strong>.<br>Ex.: desabilitar botão conforme estado do sistema; impedir digitar letras em campos numéricos."
  },
  {
    cat: "Restrições e Rupturas",
    q: "O que é Prevenção Apoiada / Alerta (AL)?",
    a: "O preposto <strong>descreve uma situação de risco e pede decisão informada</strong> ao usuário.<br>Ex.: 'Arquivo já existe, deseja sobrescrevê-lo?'; 'Alterações não salvas. Deseja salvá-las?'"
  },
  {
    cat: "Restrições e Rupturas",
    q: "O que é Recuperação Apoiada (RA)?",
    a: "Após uma ruptura, o preposto <strong>descreve o erro e oferece ao usuário a chance de se recuperar</strong>.<br>Ex.: mensagem de campo preenchido incorretamente com destaque no campo a corrigir."
  },
  {
    cat: "Restrições e Rupturas",
    q: "O que é Captura de Erro (CE)?",
    a: "Após uma ruptura, o preposto identifica que <strong>o usuário não pode se recuperar pela interface</strong> e indica o que fazer fora do sistema.<br>Ex.: 'Arquivo corrompido. Tente copiá-lo novamente da origem.'"
  },

  // ── ATENDEMONITOR ──
  {
    cat: "AtendeMonitor",
    q: "Quais são os principais Signo-entidades do AtendeMonitor?",
    a: "<strong>Atendimento</strong> — o agendamento em si<br><strong>Monitor</strong> — quem disponibiliza horários<br><strong>Estudante</strong> — quem agenda<br><strong>Horário</strong> — o slot de tempo disponível"
  },
  {
    cat: "AtendeMonitor",
    q: "Quais são os Signo-atributos do signo-entidade Atendimento?",
    a: "<strong>data</strong>, <strong>hora</strong>, <strong>assunto da dúvida</strong>, <strong>status</strong> (concluído/ausência), <strong>modalidade</strong> (presencial/online)"
  },
  {
    cat: "AtendeMonitor",
    q: "O signo 'assunto da dúvida' é de que tipo de origem?",
    a: "<strong>Signo de Domínio</strong> — existe no mundo do estudante independentemente do sistema. A dúvida existe antes mesmo de abrir o AtendeMonitor."
  },
  {
    cat: "AtendeMonitor",
    q: "O signo 'status Concluído/Ausência' é de que tipo de origem?",
    a: "<strong>Signo de Aplicação</strong> — só faz sentido dentro do AtendeMonitor. 'Ausência' como status de atendimento não é um conceito que o usuário usa fora do sistema."
  },
  {
    cat: "AtendeMonitor",
    q: "O signo 'horário disponível' é de que tipo de origem?",
    a: "<strong>Signo Transformado</strong> — parte do conceito real de agenda/horário, mas transformado ao incorporar lógica de vagas, disponibilidade e agendamento online."
  },
  {
    cat: "AtendeMonitor",
    q: "Qual seria a expressão do signo 'status' quando exibido pelo preposto (d:)?",
    a: "Seria um elemento de <strong>saída (output)</strong>, como um rótulo ou badge visual — ex.: 'Concluído ✓' ou 'Ausência ✗' — pois o preposto está apresentando a informação ao usuário."
  },
  {
    cat: "AtendeMonitor",
    q: "Qual seria a expressão do signo 'data' quando manipulado pelo monitor (u+d:)?",
    a: "Seria um elemento de <strong>entrada (input)</strong> — como um seletor de data (datepicker) ou campo com formato dd/mm/aaaa — pois o monitor preenche os horários disponíveis."
  },
  {
    cat: "AtendeMonitor",
    q: "Qual mecanismo de ruptura se aplica quando o horário já está ocupado no AtendeMonitor?",
    a: "<strong>Recuperação Apoiada (RA)</strong> — o sistema informa que o horário foi ocupado e sugere que o estudante escolha outro, permitindo retomar a conversa de forma produtiva."
  }
];

let deck = [...ALL_CARDS];
let current = 0;
let flipped = false;
let activeCategory = "Todas";

const categories = ["Todas", ...new Set(ALL_CARDS.map(c => c.cat))];

function buildCats() {
  const wrap = document.getElementById('cats');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    const count = cat === "Todas" ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      deck = cat === "Todas" ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === cat);
      current = 0;
      render();
    };
    wrap.appendChild(btn);
  });
}

function render() {
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  const c = deck[current];
  document.getElementById('tag').textContent = c.cat;
  document.getElementById('question').textContent = c.q;
  document.getElementById('answer').innerHTML = c.a;
  document.getElementById('progress').textContent = `${current + 1} / ${deck.length}`;
  document.getElementById('bar').style.width = `${((current + 1) / deck.length) * 100}%`;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function navigate(dir) {
  current = (current + dir + deck.length) % deck.length;
  render();
}

function shuffle() {
  deck = deck.sort(() => Math.random() - 0.5);
  current = 0;
  render();
}

buildCats();
render();
</script>
</body>
</html>
